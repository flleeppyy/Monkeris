author: Sun-Soaked
delete-after: true
changes:
  - rscadd: A number of ruins to the mining caves ruin pool, including several 
      categories split over different depth levels
  - rscadd: re-implements broken dummy floor tiles
  - rscadd: large crates can now be mapped to carry any items they spawn in on 
      the same tile as, like lockers & other storage objects
  - rscadd: an emagged mining turret variant for mapping
  - balance: some existing mining ruins have slightly more loot
  - balance: splits mining ruins up so more valuable ones only appear in higher 
      danger caves
  - code_imp: mining poi code now differentiates between large and small ruins, 
      and can define a max seismic lvl to spawn ruins at
  - bugfix: golems no longer explode or drop their ores while in nullspace
