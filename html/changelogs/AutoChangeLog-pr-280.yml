author: BartDrown
delete-after: true
changes:
  - bugfix: Traitor Panel now properly refreshes after removing an antagonist 
      role
  - bugfix: Removing an antagonist role now reverses its stat bonuses
  - bugfix: Removing contractor status now deletes the contractor's uplink
  - bugfix: Removing contractor status now clears related entries from the 
      player's memory
  - bugfix: Removing one contractor role no longer removes uplinks belonging to 
      other contractor roles on the same player
  - bugfix: Deleting a headset uplink no longer breaks the headset's frequency 
      selection
  - admin: Adding a duplicate antagonist role now shows a warning prompt
  - admin: Multiple antagonist roles of the same type are now numbered in the 
      Traitor Panel
