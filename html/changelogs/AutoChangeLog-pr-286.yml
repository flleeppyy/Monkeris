author: Sun-Soaked
delete-after: true
changes:
  - rscadd: Blurriness debuff now actually blurs the screen, using filters.
  - rscadd: A "hazy" debuff containing previous screen clouding behavior of 
      blurriness
  - bugfix: The damage of welding without protection now scales and gives visual
      effects as intended
  - code_imp: filters can now be assigned and manipulated with some discrete 
      procs on atom
  - code_imp: Adds template helpers for different filter operations
  - admin: adds "filteriffic", tg's tgui interface for admin manipulation of 
      filters ingame. Accessed via the vv menu "edit filters"
